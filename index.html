<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0e0c" />
    <meta
      name="description"
      content="Plato — living restaurant menus in many languages with real plate photos."
    />
    <title>Plato — The menu that speaks their language</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a href="#" class="brand" data-nav="home" data-i18n="navHome">
          <span class="brand-mark">🌮</span>
          <span class="brand-label">Plato</span>
        </a>
        <nav class="nav-links">
          <a href="#menu" data-nav="menu">Menu</a>
          <a href="#admin" data-nav="admin">Owner</a>
        </nav>
        <div class="lang-switch" role="group" aria-label="Language"></div>
      </header>

      <main>
        <section id="view-home" class="view active"></section>
        <section id="view-menu" class="view"></section>
        <section id="view-admin" class="view"></section>
      </main>
    </div>

    <div id="modal-root" class="modal-root" aria-live="polite"></div>
    <div id="toast" class="toast" role="status"></div>

    <script src="js/langs.js"></script>
    <script src="js/seed.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/translate.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
