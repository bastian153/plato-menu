<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0b0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Restaurant menu — languages, photos, real plates." />
    <title>Menu · Plato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      body.public-menu {
        /* Guest-only chrome: no Plato marketing topbar */
      }
      .public-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        padding: 0.7rem 1rem;
        padding-top: calc(0.7rem + env(safe-area-inset-top, 0px));
        background: rgba(20, 18, 16, 0.82);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        position: sticky;
        top: 0;
        z-index: 50;
        backdrop-filter: blur(18px) saturate(1.2);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
      }
      .public-bar strong {
        letter-spacing: -0.02em;
        font-size: 0.95rem;
      }
      .public-bar .tag {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.1rem;
        max-width: 55vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* Section chips stick under public language bar */
      body.public-menu .cats-wrap {
        top: 56px;
      }
      body.public-menu .menu-section {
        scroll-margin-top: 120px;
      }
      body.public-menu .menu-section-title {
        top: 112px;
      }
      body.public-menu .menu-wrap {
        padding-bottom: calc(5.75rem + env(safe-area-inset-bottom, 0px));
      }
      .public-footer {
        text-align: center;
        padding: 1.5rem 1rem 0.5rem;
        font-size: 0.75rem;
        color: var(--muted-2);
      }
      .public-footer a {
        color: var(--muted);
        text-decoration: none;
      }
      .err {
        max-width: 420px;
        margin: 4rem auto;
        text-align: center;
        color: var(--muted);
        padding: 1.25rem;
        background: var(--bg-card);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 18px;
      }
      .loading-public {
        text-align: center;
        padding: 4rem 1rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body class="public-menu">
    <div class="public-bar">
      <div>
        <strong id="rest-name">…</strong>
        <div class="tag" id="rest-tag"></div>
      </div>
      <select id="lang-select" class="lang-select" aria-label="Language"></select>
    </div>
    <div id="app"><p class="loading-public">Loading menu…</p></div>
    <div id="modal-root" class="modal-root" aria-live="polite"></div>
    <div id="toast" class="toast" role="status"></div>

    <script src="/js/langs.js"></script>
    <script src="/js/themes.js"></script>
    <script>
      (function () {
        const parts = location.pathname.replace(/\/+$/, "").split("/");
        const slug = parts[parts.length - 1] || "";
        const app = document.getElementById("app");
        const modalRoot = document.getElementById("modal-root");
        let menu = null;
        let lang =
          localStorage.getItem("plato_lang") ||
          (navigator.language || "en").slice(0, 2);
        let photoIndex = 0;
        let currentDish = null;
        let cart = [];
        let viewMode = localStorage.getItem('plato_view_' + slug) || 'list';
        let help = { hunger: null, spice: null, pref: null };
        let navLockUntil = 0;
        let scrollHandler = null;

        function tMap(map) {
          if (!map) return "";
          if (typeof map === "string") return map;
          return map[lang] || map.en || map.es || Object.values(map)[0] || "";
        }

        function ui(key) {
          try {
            if (typeof platoT === "function") return platoT(lang, key) || key;
          } catch (_) {}
          return key;
        }

        function toast(msg) {
          const el = document.getElementById("toast");
          el.textContent = msg;
          el.classList.add("show");
          setTimeout(() => el.classList.remove("show"), 2200);
        }

        function esc(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        async function load() {
          if (!slug || slug === "m") {
            app.innerHTML =
              '<p class="err">Missing restaurant in URL. Use <code>/m/your-slug</code></p>';
            return;
          }
          try {
            const res = await fetch(
              `/api/public/${encodeURIComponent(slug)}?lang=${encodeURIComponent(lang)}`
            );
            if (!res.ok) throw new Error("Menu not found");
            const data = await res.json();
            menu = data.menu;
            document.title = (menu.restaurant.name || "Menu") + " · Menu";
            if (typeof platoApplyTheme === "function") {
              platoApplyTheme(platoGetTheme(menu.restaurant.themeId || "sunset-taco"));
            }
            document.getElementById("rest-name").textContent =
              (menu.restaurant.emoji || "🍽️") + " " + menu.restaurant.name;
            document.getElementById("rest-tag").textContent =
              tMap(menu.restaurant.tagline) || tMap(menu.restaurant.hours) || "";

            const enabled = (menu.settings && menu.settings.enabledLangs) || ["en", "es"];
            if (!enabled.includes(lang)) lang = enabled[0] || "en";
            const sel = document.getElementById("lang-select");
            sel.innerHTML = (window.PLATO_LANGS || [])
              .filter((l) => enabled.includes(l.code))
              .map(
                (l) =>
                  `<option value="${l.code}" ${l.code === lang ? "selected" : ""}>${l.native}</option>`
              )
              .join("");
            sel.onchange = () => {
              lang = sel.value;
              localStorage.setItem("plato_lang", lang);
              document.documentElement.lang = lang;
              const meta = (PLATO_LANGS || []).find((x) => x.code === lang);
              document.documentElement.dir = meta && meta.dir === "rtl" ? "rtl" : "ltr";
              document.getElementById("rest-tag").textContent =
                tMap(menu.restaurant.tagline) || tMap(menu.restaurant.hours) || "";
              render();
            };
            document.documentElement.lang = lang;
            const meta = (PLATO_LANGS || []).find((x) => x.code === lang);
            document.documentElement.dir = meta && meta.dir === "rtl" ? "rtl" : "ltr";
            render();
          } catch (e) {
            app.innerHTML = `<p class="err">Could not load menu for <strong>${esc(slug)}</strong>.<br/>${esc(e.message)}</p>`;
          }
        }

        function catLabel(c) {
          if (!c) return "";
          return tMap(c.labels) || c.id || "";
        }

        function categoriesWithDishes() {
          const dishes = menu.dishes || [];
          const used = new Set(dishes.map((d) => d.category).filter(Boolean));
          const cats = (menu.categories || []).filter((c) => used.has(c.id));
          dishes.forEach((d) => {
            if (d.category && !cats.find((c) => c.id === d.category)) {
              cats.push({ id: d.category, labels: { en: d.category } });
            }
          });
          return cats;
        }

        function dishCard(d) {
          const thumb = (d.photos && d.photos[0]) || "";
          const spice = "🌶️".repeat(d.spicy || 0);
          return `<button type="button" class="dish-card ${d.soldOut ? "sold" : ""}" data-id="${d.id}">
            ${thumb ? `<img class="dish-thumb" src="${thumb}" alt="" loading="lazy"/>` : `<div class="dish-thumb placeholder-thumb">🍽️</div>`}
            <div class="dish-body">
              <div class="dish-top">
                <div class="dish-name">${esc(tMap(d.name))}</div>
                <div class="dish-price">$${Number(d.price).toFixed(2)}</div>
              </div>
              <p class="dish-desc">${esc(tMap(d.desc))}</p>
              <div class="dish-meta">
                ${d.popular ? `<span class="badge popular">${esc(ui("popular"))}</span>` : ""}
                ${d.soldOut ? `<span class="badge sold">${esc(ui("soldOut"))}</span>` : ""}
                ${d.spicy ? `<span class="badge">${esc(ui("spicy"))} ${spice}</span>` : ""}
                ${(d.photos && d.photos.length) ? `<span class="badge photos">📸 ${d.photos.length}</span>` : ""}
              </div>
            </div>
          </button>`;
        }

        function render() {
          if (!menu) return;
          if (scrollHandler) {
            window.removeEventListener("scroll", scrollHandler);
            scrollHandler = null;
          }
          const r = menu.restaurant;
          const cats = categoriesWithDishes();
          const dishes = menu.dishes || [];
          const sectionsHtml = cats.length
            ? cats
                .map((c) => {
                  const list = dishes.filter((d) => d.category === c.id);
                  if (!list.length) return "";
                  return `<section class="menu-section" id="section-${esc(c.id)}" data-section="${esc(c.id)}">
                    <h2 class="menu-section-title">${esc(catLabel(c))}</h2>
                    ${list.map(dishCard).join("")}
                  </section>`;
                })
                .join("")
            : `<div class="dish-list">${dishes.map(dishCard).join("")}</div>`;

          app.innerHTML = `
            <div class="menu-wrap">
              <header class="resto-header">
                <div class="emoji">${esc(r.emoji || "🍽️")}</div>
                <h1>${esc(r.name)}</h1>
                <p class="meta">${esc(tMap(r.tagline))}${tMap(r.address) ? " · " + esc(tMap(r.address)) : ""}</p>
                ${tMap(r.hours) ? `<div class="status">${esc(tMap(r.hours))}</div>` : ""}
              </header>
              ${
                cats.length
                  ? `<div class="cats-wrap"><nav class="cats" aria-label="Menu sections">
                      <button type="button" class="cat-pill active" data-cat="all">${esc(ui("all") || "All")}</button>
                      ${cats
                        .map(
                          (c) =>
                            `<button type="button" class="cat-pill" data-cat="${esc(c.id)}">${esc(catLabel(c))}</button>`
                        )
                        .join("")}
                    </nav></div>`
                  : ""
              }
              ${
                r.constellationEnabled
                  ? `<div style="padding:0.5rem 1rem;display:flex;gap:0.4rem">
                      <button type="button" class="btn btn-sm ${viewMode==='list'?'btn-primary':'btn-ghost'}" id="mode-list">List</button>
                      <button type="button" class="btn btn-sm ${viewMode==='map'?'btn-primary':'btn-ghost'}" id="mode-map">Constellation</button>
                    </div>`
                  : ""
              }
              ${
                viewMode === "map" && r.constellationEnabled
                  ? `<div class="constellation-map" id="constellation-map"></div>`
                  : `<div class="dish-list dish-list-sections">${sectionsHtml}</div>`
              }
              <p class="public-footer">Powered by <a href="/" rel="noopener">Plato</a></p>
              ${
                r.ordersEnabled !== false
                  ? `<div class="cart-bar" id="cart-bar" style="${cart.length ? "" : "display:none"}">
                      <button type="button" class="btn btn-primary" id="open-cart" style="flex:1">Order · ${cart.reduce((n,i)=>n+(i.qty||1),0)} items</button>
                    </div>`
                  : ""
              }
              <div class="help-bar">
                <button type="button" class="btn btn-primary" id="btn-help">${esc(ui("helpBtn") || "Help me choose")}</button>
              </div>
            </div>`;

          const catsNav = app.querySelector(".cats");

          function scrollChipIntoView(catId) {
            if (!catsNav) return;
            const pill = catsNav.querySelector(`.cat-pill[data-cat="${catId}"]`);
            if (!pill) return;
            const navRect = catsNav.getBoundingClientRect();
            const pillRect = pill.getBoundingClientRect();
            const pad = 24;
            if (pillRect.left < navRect.left + pad) {
              catsNav.scrollBy({ left: pillRect.left - navRect.left - pad, behavior: "smooth" });
            } else if (pillRect.right > navRect.right - pad) {
              catsNav.scrollBy({ left: pillRect.right - navRect.right + pad, behavior: "smooth" });
            } else {
              const delta =
                pillRect.left + pillRect.width / 2 - (navRect.left + navRect.width / 2);
              if (Math.abs(delta) > 8) catsNav.scrollBy({ left: delta, behavior: "smooth" });
            }
          }

          function setActive(catId, forceScroll) {
            const changed = app.querySelector(`.cat-pill.active`)?.dataset?.cat !== catId;
            app.querySelectorAll(".cat-pill").forEach((p) =>
              p.classList.toggle("active", p.dataset.cat === catId)
            );
            if (forceScroll || changed) scrollChipIntoView(catId);
          }

          app.querySelectorAll("[data-id]").forEach((btn) => {
            btn.onclick = () => openDish(btn.dataset.id);
          });
          app.querySelectorAll(".cat-pill").forEach((btn) => {
            btn.onclick = () => {
              const cat = btn.dataset.cat;
              navLockUntil = Date.now() + 900;
              if (cat === "all") {
                window.scrollTo({ top: 0, behavior: "smooth" });
                setActive("all", true);
                return;
              }
              const el = document.getElementById("section-" + cat);
              setActive(cat, true);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
            };
          });

          const helpBtn = document.getElementById("btn-help");
          if (helpBtn) {
            helpBtn.onclick = () => {
              help = { hunger: null, spice: null, pref: null };
              showHelp();
            };
          }

          const modeList = document.getElementById("mode-list");
          const modeMap = document.getElementById("mode-map");
          if (modeList) modeList.onclick = () => { viewMode = "list"; localStorage.setItem("plato_view_" + slug, viewMode); render(); };
          if (modeMap) modeMap.onclick = () => { viewMode = "map"; localStorage.setItem("plato_view_" + slug, viewMode); render(); };
          if (viewMode === "map" && r.constellationEnabled) {
            const map = document.getElementById("constellation-map");
            if (map) {
              dishes.forEach((d, i) => {
                const n = dishes.length || 1;
                const angle = (i / n) * Math.PI * 2;
                const rad = 28 + (i % 3) * 10;
                const x = 50 + Math.cos(angle) * rad;
                const y = 50 + Math.sin(angle) * (rad * 0.75);
                const node = document.createElement("button");
                node.type = "button";
                node.className = "constellation-node";
                node.style.left = x + "%";
                node.style.top = y + "%";
                node.innerHTML = esc(tMap(d.name)) + '<span class="cn-price">$' + Number(d.price).toFixed(2) + "</span>";
                node.onclick = () => openDish(d.id);
                map.appendChild(node);
              });
            }
          }
          const openCart = document.getElementById("open-cart");
          if (openCart) openCart.onclick = showCart;


          const sections = [...app.querySelectorAll(".menu-section[data-section]")];
          if (sections.length) {
            const pick = () => {
              if (Date.now() < navLockUntil) return;
              const sticky = app.querySelector(".cats-wrap") || app.querySelector(".cats");
              const pubBar = document.querySelector(".public-bar");
              const offset =
                (pubBar ? pubBar.getBoundingClientRect().height : 56) +
                (sticky ? sticky.getBoundingClientRect().height : 48) +
                4;
              let current = sections[0];
              for (const sec of sections) {
                if (sec.getBoundingClientRect().top - offset <= 1) current = sec;
                else break;
              }
              if (window.scrollY < 48) {
                setActive("all", false);
                return;
              }
              const id = current && current.getAttribute("data-section");
              if (id) setActive(id, false);
            };
            let raf = 0;
            scrollHandler = () => {
              if (raf) cancelAnimationFrame(raf);
              raf = requestAnimationFrame(pick);
            };
            window.addEventListener("scroll", scrollHandler, { passive: true });
            pick();
          }
        }

        function openDish(id) {
          const d = menu.dishes.find((x) => x.id === id);
          if (!d) return;
          currentDish = d;
          photoIndex = 0;
          fetch(`/api/public/${encodeURIComponent(slug)}/events`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "dish_open", dishId: id, lang }),
          }).catch(() => {});
          showDish();
        }

        function showDish() {
          const d = currentDish;
          const photos = d.photos || [];
          const idx = photos.length ? photoIndex % photos.length : 0;
          const label = !photos.length
            ? ui("noPhoto") || "No photo yet"
            : idx === 0
              ? ui("official") || "From the kitchen"
              : (ui("guestPhotos") || "Guest photos") + " · " + idx;
          modalRoot.classList.add("open");
          modalRoot.innerHTML = `
            <div class="modal-sheet" role="dialog" aria-modal="true">
              <div class="modal-carousel">
                <button class="modal-close" id="x" aria-label="Close">×</button>
                <span class="photo-label">${esc(label)}</span>
                ${
                  photos.length
                    ? `<img src="${photos[idx]}" alt=""/>`
                    : `<div class="no-photo-lg">🍽️</div>`
                }
                ${
                  photos.length > 1
                    ? `<div class="carousel-nav">
                        <button type="button" id="prev">‹</button>
                        <button type="button" id="next">›</button>
                      </div>
                      <div class="carousel-dots">${photos
                        .map((_, i) => `<span class="${i === idx ? "on" : ""}"></span>`)
                        .join("")}</div>`
                    : ""
                }
              </div>
              <div class="modal-body">
                <div class="dish-meta" style="margin-bottom:0.5rem">
                  ${d.popular ? `<span class="badge popular">${esc(ui("popular"))}</span>` : ""}
                  ${d.soldOut ? `<span class="badge sold">${esc(ui("soldOut"))}</span>` : ""}
                </div>
                <h2>${esc(tMap(d.name))}</h2>
                <div class="modal-price">$${Number(d.price).toFixed(2)}</div>
                <p class="modal-desc">${esc(tMap(d.desc))}</p>
                <div class="modal-section">
                  <strong>${esc(ui("allergens") || "Allergens")}</strong>
                  <span>${esc(tMap(d.allergens) || "—")}</span>
                </div>
                ${
                  d.soldOut
                    ? ""
                    : `<div class="order-hint">${esc(ui("orderHint") || "Show this screen at the counter")}</div>`
                }
                ${
                  !d.soldOut && menu.restaurant.ordersEnabled !== false
                    ? `<button type="button" class="btn btn-primary" id="add-cart" style="width:100%;margin-top:0.85rem">Add to order</button>`
                    : ""
                }
                <label class="field" style="margin-top:1rem">
                  <span>Share a photo of this dish (pending approval)</span>
                  <input type="file" id="guest-photo" accept="image/*" capture="environment"/>
                </label>
              </div>
            </div>`;
          document.getElementById("x").onclick = closeModal;
          modalRoot.onclick = (e) => {
            if (e.target === modalRoot) closeModal();
          };
          const prev = document.getElementById("prev");
          const next = document.getElementById("next");
          if (prev)
            prev.onclick = (e) => {
              e.stopPropagation();
              photoIndex = (photoIndex - 1 + photos.length) % photos.length;
              showDish();
            };
          if (next)
            next.onclick = (e) => {
              e.stopPropagation();
              photoIndex = (photoIndex + 1) % photos.length;
              showDish();
            };
          const gp = document.getElementById("guest-photo");
          if (gp) {
            gp.onchange = async () => {
              const file = gp.files && gp.files[0];
              if (!file) return;
              const fd = new FormData();
              fd.append("photo", file);
              try {
                const res = await fetch(
                  `/api/public/${encodeURIComponent(slug)}/dishes/${encodeURIComponent(d.id)}/photos`,
                  { method: "POST", body: fd }
                );
                if (!res.ok) throw new Error("Upload failed");
                toast("Photo submitted for approval");
              } catch {
                toast("Upload failed");
              }
            };
          }
          const addCart = document.getElementById("add-cart");
          if (addCart) {
            addCart.onclick = () => {
              const existing = cart.find((x) => x.dishId === d.id);
              if (existing) existing.qty += 1;
              else
                cart.push({
                  dishId: d.id,
                  name: tMap(d.name),
                  price: Number(d.price) || 0,
                  qty: 1,
                });
              toast("Added to order");
              closeModal();
              render();
            };
          }
        }

        function showCart() {
          const total = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
          modalRoot.classList.add("open");
          modalRoot.innerHTML = `
            <div class="modal-sheet" role="dialog">
              <div class="modal-body" style="padding-top:1.25rem">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                  <h2 style="font-family:var(--display);font-size:1.35rem">Your order</h2>
                  <button class="btn btn-ghost btn-sm" id="cart-x">Close</button>
                </div>
                ${cart
                  .map(
                    (i, idx) =>
                      `<div class="analytics-row"><span>${i.qty}× ${esc(i.name)}</span>
                        <span>$${(i.price * i.qty).toFixed(2)}
                        <button type="button" data-rm="${idx}" style="margin-left:0.35rem;color:var(--danger)">✕</button></span></div>`
                  )
                  .join("") || "<p style=\"color:var(--muted)\">Empty</p>"}
                <p style="margin:0.85rem 0;font-weight:700">Total $${total.toFixed(2)}</p>
                <label class="field"><span>Table / name</span><input id="cart-table" placeholder="Table 4" /></label>
                <label class="field"><span>Note</span><input id="cart-note" placeholder="No onions" /></label>
                <label class="field"><span>Tip (optional $)</span><input id="cart-tip" type="number" min="0" step="0.5" value="0" /></label>
                <button type="button" class="btn btn-primary" id="cart-send" style="width:100%">Send to counter</button>
                <button type="button" class="btn btn-ghost" id="cart-pay" style="width:100%;margin-top:0.5rem">Pay tip with card</button>
              </div>
            </div>`;
          document.getElementById("cart-x").onclick = closeModal;
          modalRoot.querySelectorAll("[data-rm]").forEach((b) => {
            b.onclick = () => {
              cart.splice(Number(b.dataset.rm), 1);
              showCart();
            };
          });
          document.getElementById("cart-send").onclick = async () => {
            if (!cart.length) return toast("Add dishes first");
            try {
              const res = await fetch(`/api/public/${encodeURIComponent(slug)}/orders`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  items: cart,
                  tableCode: document.getElementById("cart-table").value,
                  note: document.getElementById("cart-note").value,
                  tip: Number(document.getElementById("cart-tip").value) || 0,
                  lang,
                }),
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || "Failed");
              toast("Order sent · " + (data.order && data.order.id));
              cart = [];
              closeModal();
              render();
            } catch (e) {
              toast(e.message || "Order failed");
            }
          };
          document.getElementById("cart-pay").onclick = async () => {
            const tip = Number(document.getElementById("cart-tip").value) || 0;
            if (tip < 0.5) return toast("Enter a tip of at least $0.50");
            try {
              const res = await fetch(`/api/public/${encodeURIComponent(slug)}/pay-tip`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount: tip }),
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || "Payment unavailable");
              if (data.url) location.href = data.url;
            } catch (e) {
              toast(e.message || "Stripe not configured");
            }
          };
        }

        function closeModal() {
          modalRoot.classList.remove("open");
          modalRoot.innerHTML = "";
        }

        function suggestDish() {
          const dishes = (menu.dishes || []).filter((d) => !d.soldOut);
          if (!dishes.length) return null;
          let pool = dishes.slice();
          if (help.spice === "hot") {
            const hot = pool.filter((d) => (d.spicy || 0) >= 2);
            if (hot.length) pool = hot;
          } else if (help.spice === "mild") {
            const mild = pool.filter((d) => (d.spicy || 0) <= 1);
            if (mild.length) pool = mild;
          }
          if (help.hunger === "light") {
            const light = pool.filter((d) => Number(d.price) < 12);
            if (light.length) pool = light;
          } else if (help.hunger === "full") {
            const full = pool.filter((d) => Number(d.price) >= 12);
            if (full.length) pool = full;
          }
          if (help.pref === "veg") {
            const veg = pool.filter((d) => {
              const t = (tMap(d.name) + " " + tMap(d.desc)).toLowerCase();
              return /veg|salad|tofu|bean|mushroom|quesadilla|nopal|aguacate|avocado/.test(t);
            });
            if (veg.length) pool = veg;
          }
          const popular = pool.filter((d) => d.popular);
          const pick = popular.length ? popular : pool;
          return pick[Math.floor(Math.random() * pick.length)];
        }

        function showHelp() {
          const ready = help.hunger && help.spice && help.pref;
          const suggestion = ready ? suggestDish() : null;
          const block = (key, q, opts) => `
            <div>
              <div class="help-q">${esc(q)}</div>
              <div class="help-options">
                ${opts
                  .map(
                    ([val, label]) =>
                      `<button type="button" data-help="${key}" data-val="${val}" class="${help[key] === val ? "selected" : ""}">${esc(label)}</button>`
                  )
                  .join("")}
              </div>
            </div>`;
          modalRoot.classList.add("open");
          modalRoot.innerHTML = `
            <div class="modal-sheet" role="dialog">
              <div class="modal-body" style="padding-top:1.25rem">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                  <h2 style="font-family:var(--display);font-size:1.35rem">${esc(ui("helpTitle") || "Not sure what to get?")}</h2>
                  <button class="btn btn-ghost btn-sm" id="help-x">${esc(ui("helpClose") || "Close")}</button>
                </div>
                <div class="help-steps">
                  ${block("hunger", ui("helpQ1") || "How hungry?", [
                    ["light", ui("helpLight") || "Light bite"],
                    ["full", ui("helpFull") || "Full meal"],
                  ])}
                  ${block("spice", ui("helpQ2") || "Spice level?", [
                    ["mild", ui("helpMild") || "Mild"],
                    ["hot", ui("helpHot") || "Bring heat"],
                  ])}
                  ${block("pref", ui("helpQ3") || "Prefer?", [
                    ["meat", ui("helpMeat") || "Meat"],
                    ["veg", ui("helpVeg") || "Veggie-friendly"],
                  ])}
                  ${
                    suggestion
                      ? `<div class="help-result">
                          <div style="color:var(--muted);font-size:0.85rem;margin-bottom:0.35rem">${esc(ui("helpResult") || "We suggest")}</div>
                          <strong style="font-size:1.15rem">${esc(tMap(suggestion.name))}</strong>
                          <p style="color:var(--muted);font-size:0.9rem;margin:0.35rem 0 0.75rem">${esc(tMap(suggestion.desc))}</p>
                          <button class="btn btn-primary btn-sm" id="see-suggest">${esc(ui("seeDish") || "See dish")}</button>
                        </div>`
                      : ""
                  }
                </div>
              </div>
            </div>`;
          document.getElementById("help-x").onclick = closeModal;
          modalRoot.onclick = (e) => {
            if (e.target === modalRoot) closeModal();
          };
          modalRoot.querySelectorAll("[data-help]").forEach((btn) => {
            btn.onclick = () => {
              help[btn.dataset.help] = btn.dataset.val;
              showHelp();
            };
          });
          const see = document.getElementById("see-suggest");
          if (see && suggestion) {
            see.onclick = () => {
              closeModal();
              openDish(suggestion.id);
            };
          }
        }

        load();
      })();
    </script>
  </body>
</html>
